name: Backend CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            echo "No requirements file found" && exit 1
          fi

      - name: Debug checkout state
        run: |
          echo "event=$GITHUB_EVENT_NAME"
          echo "ref=$GITHUB_REF"
          echo "sha=$GITHUB_SHA"
          git rev-parse HEAD
          git log --oneline -1
          python - <<'PY'
          from pathlib import Path
          path = Path("services/sos/main.py")
          lines = path.read_text().splitlines()
          for i in range(200, 212):
              if i <= len(lines):
                  print(f"{i}: {lines[i-1]}")
          PY

      - name: Run Black (check only)
        run: black --check .

      - name: Run Ruff (check only)
        run: ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            echo "No requirements file found" && exit 1
          fi

      - name: Debug checkout state
        run: |
          echo "event=$GITHUB_EVENT_NAME"
          echo "ref=$GITHUB_REF"
          echo "sha=$GITHUB_SHA"
          git rev-parse HEAD
          git log --oneline -1
          python - <<'PY'
          from pathlib import Path
          path = Path("services/sos/main.py")
          lines = path.read_text().splitlines()
          for i in range(200, 212):
              if i <= len(lines):
                  print(f"{i}: {lines[i-1]}")
          PY

      - name: Run pytest with coverage
        run: pytest --cov=libs --cov=services --cov-report=term-missing --cov-report=html --cov-report=xml --cov-fail-under=80

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            htmlcov
            coverage.xml

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    # Only run on push to main (after PR merge)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: detect
        run: |
          echo "🔍 Detecting which services changed..."
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "$CHANGED_FILES"
          ALL_SERVICES="feedback notification routing_service safety_scoring sos user_management"
          CHANGED_SERVICES=""
          for SERVICE in $ALL_SERVICES; do
            if echo "$CHANGED_FILES" | grep -q "services/$SERVICE/"; then
              CHANGED_SERVICES="$CHANGED_SERVICES $SERVICE"
            fi
          done
          if echo "$CHANGED_FILES" | grep -Eq "requirements|libs/|.github/workflows/"; then
            CHANGED_SERVICES="$ALL_SERVICES"
          fi
          CHANGED_SERVICES=$(echo "$CHANGED_SERVICES" | xargs)
          echo "✅ Services to build: $CHANGED_SERVICES"
          echo "services=$CHANGED_SERVICES" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push changed images
        if: steps.detect.outputs.services != ''
        run: |
          for SERVICE in ${{ steps.detect.outputs.services }}; do
            echo "🚀 Building and pushing $SERVICE..."
            docker buildx build \
              --platform linux/amd64 \
              -f ./services/$SERVICE/dockerfile \
              -t saferoute/$SERVICE:latest \
              --push .
          done

      - name: Skip build if no services changed
        if: steps.detect.outputs.services == ''
        run: echo "✅ No services changed. Skipping Docker build."